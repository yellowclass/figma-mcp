apiVersion: v1
kind: Secret
metadata:
  name: figma-mcp-secrets
  namespace: figma-mcp
  labels:
    app: figma-mcp
type: Opaque
stringData:
  # Token that MCP clients must send as Bearer token to authenticate
  # Generate: openssl rand -hex 32
  MCP_AUTH_TOKEN: "<MCP_AUTH_TOKEN>"
  # Figma OAuth credentials (from setup-figma-oauth.sh)
  FIGMA_OAUTH_CLIENT_ID: "<FIGMA_OAUTH_CLIENT_ID>"
  FIGMA_OAUTH_CLIENT_SECRET: "<FIGMA_OAUTH_CLIENT_SECRET>"
  FIGMA_OAUTH_REFRESH_TOKEN: "<FIGMA_OAUTH_REFRESH_TOKEN>"
